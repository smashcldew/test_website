name: Backend Keep Alive

# 觸發條件：定時執行與手動執行
on:
  schedule:
    # 每 14 分鐘執行一次 (避免超過 Render 的 15 分鐘休眠時限)
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        # 🚨 核心邏輯：用 curl 發送請求到你的真實 API 端點，喚醒伺服器
        run: |
          echo "Sending keep-alive ping to Render backend..."
          curl -s https://test-website-f5nx.onrender.com/api/projects > /dev/null
          echo "Ping finished at $(date)"