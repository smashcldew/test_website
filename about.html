<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>金門縣金湖鎮金湖國民小學</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /*  Navbar */
        .navbar {
            position: relative;
            top: 0;
            width: 100%;
            padding: 15px 50px;
            background: #ffffff;
            display: flex;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            position: absolute;
            left: 50px;
        }

        .logo img {
            height: 40px;
        }

        .menu {
            margin: auto;
        }

        .menu a {
            color: #000000;
            text-decoration: none;
            margin: 20px;
        }

        .menu a:hover {
            color: #7a7a7a;
        }

        /*  Hero */
        .hero {
            height: 100vh;
            background: url("https://picsum.photos/1600/900") center/cover no-repeat;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            color: white;
            text-align: center;
            position: relative;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
        }

        .hero h1, .hero p, .hero button {
            position: relative;
        }

        .hero h1 {
            font-size: 50px;
        }

        .hero p {
            font-size: 20px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Section */
        .section {
            padding: 80px 20px;
            text-align: center;
        }

        .section h2 {
            font-size: 32px;
        }

        .section p {
            max-width: 600px;
            margin: 20px auto;
        }

        /*  Cards */
        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 12px;
            width: 250px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        /* dropdown 容器 */
        .dropdown {
        position: relative;
        display: inline-block;
        }

        /* 下拉內容（預設隱藏） */
        .dropdown-content {
        display: none;
        position: absolute;
        background: white;
        min-width: 100%;
        top: 100%;
        border-radius: 8px;
        overflow: hidden;
        }

        /* 下拉裡的連結 */
        .dropdown-content a {
            color: black;
            padding: 10px;
            display: block;
            text-decoration: none;
            white-space: nowrap;
        }

        /* hover 效果 */
        .dropdown-content a:hover {
            background: #242424;
        }

        /* 滑鼠移上去顯示 */
        .dropdown:hover .dropdown-content {
            display: block;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
    <a href="index.html" class="logo">
        <img src="logo.png" >
    </a>

    <div class="menu">

        <a href="index.html">首頁</a><!--1-->

        <!-- 下拉選單 -->
        <div class="dropdown">
            <a>各處室</a><!--2-->
            <div class="dropdown-content">
                <a href="#">教務處</a>
                <a href="#">學務處</a>
                <a href="#">總務處</a>
                <a href="#">幼兒園</a>
                <a href="#">人事室</a>
                <a href="#">會計室</a>
                <a href="#">健康中心</a>
            </div>
        </div>
        <div class="dropdown">
            <a>聯絡我們</a><!--3-->
            <div class="dropdown-content">
                <a href="https://www.facebook.com/profile.php?id=100063739041332&ref=embed_page#" target="_blank">FaceBook粉絲專頁</a>
            </div>
        </div>
        <a href="about.html">關於我們</a>
        

    </div>
</div>

    <!-- Hero -->
    <div class="hero">
        <h1>金湖國小</h1>
        <p>快樂學習 · 全人發展</p>
        <button class="btn">了解更多</button>
    </div>

    <!-- Section：學校介紹 -->
    <div class="section">
        <h2>關於金湖國小</h2>
        <p>
            我們致力於提供優質教育環境，培養學生的品格、知識與多元能力，
            讓每位孩子都能快樂學習、健康成長。
        </p>
    </div>

    <!-- Section：校園重點 -->
    <div class="section">
        <h2>校園亮點</h2>

        <div class="cards">
            <div class="card">
                <h3>校園活動</h3>
                <p>豐富多元的活動，讓學習更有趣</p>
            </div>

            <div class="card">
                <h3>課程發展</h3>
                <p>培養學生多元能力與興趣</p>
            </div>

            <div class="card">
                <h3>學生成就</h3>
                <p>展現優秀成果與榮譽表現</p>
            </div>
        </div>
    </div>

</body>
</html>
